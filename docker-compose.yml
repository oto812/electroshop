version: "3.8"

services:
  postgres:
    container_name: electro_db
    image: postgres:15-alpine
    environment:
      POSTGRES_USER: electroshop
      POSTGRES_PASSWORD: electroshop
      POSTGRES_DB: electroshop
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U electroshop"]
      interval: 5s
      timeout: 5s
      retries: 5

  backend:
    build: ./backend
    environment:
      DATABASE_URL: postgresql://electroshop:electroshop@postgres:5432/electroshop
      JWT_SECRET: your-secret-key-change-in-production
      NODE_ENV: development
    ports:
      - "3000:3000"
    depends_on:
      postgres:
        condition: service_healthy

  frontend:
    build: ./frontend
    environment:
      VITE_API_URL: http://localhost:3000
    ports:
      - "5173:5173"
    depends_on:
      - backend

volumes:
  postgres_data: